version: '3.8'

services:
  cortexcli:
    build: .
    stdin_open: true
    tty: true
    volumes:
      - .:/app
    environment:
      - TERM=xterm-256color
      # Uncomment and set your API keys
      # - GEMINI_API_KEY=your_gemini_api_key_here
      # - OPENAI_API_KEY=your_openai_api_key_here
    env_file:
      # Optional: Use .env file for secrets
      # - .env
    command: python main.py